<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeWalk — Accident Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/fab-bar.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">ProTego</div>
    <nav>
      <a href="map.html">Home</a>
      <a href="report.html">Report</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <main class="main">
    <div class="container card">
      <h2 class="text-center">Accident Assistance</h2>

      <section class="accident-sos-section">
        <p>If you are in an accident, use the SOS below.</p>
        <button id="accidentSosButton" class="sos-round" onclick="handleAccidentSOSClick()">
          SOS
        </button>
        <p id="accidentSosStatus" class="muted"></p>
      </section>

      <section>
        <h3>Nearby Hospitals</h3>
        <div id="hospitalList"></div>
      </section>

      <section style="margin-top: 24px;">
        <h3>Report accident for someone else</h3>
        <div class="row">
          <button onclick="openAccidentLocationSelector()">Report</button>
        </div>
        <p id="thirdPartyLocationLabel" class="muted" style="margin-top: 8px;">No location selected yet.</p>
      </section>
    </div>
  </main>

  <!-- Accident SOS countdown overlay -->
  <div id="accidentSosOverlay" class="route-modal" style="display:none;">
    <div class="route-card">
      <h3>Sending Accident SOS...</h3>
      <p id="accidentSosCountdownText">SOS will be sent in 10 seconds.</p>
      <button onclick="cancelAccidentSOS()">Cancel SOS</button>
    </div>
  </div>

<script src="../js/script.js"></script>
<script src="../js/fab-bar.js"></script>
<script src="../js/accident.js"></script>
</body>
</html>
