<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProTego Login</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body class="login-body">

<div class="login-container">
    <img src="../assets/logo.png" class="login-logo" alt="ProTego Logo">

    <h2>ProTego</h2>
    <p class="login-tag">Your Safety Companion</p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Please enter your Password">
    <button id="loginBtn" class="login-btn">Login</button>

    <p class="signup-link">Don’t have an account? <a href="signup.html">Register</a></p>
</div>

<script src="../js/script.js"></script>
</body>
</html>
