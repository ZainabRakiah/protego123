<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeWalk — Safety Route</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../css/style.css" />
<link rel="stylesheet" href="../css/fab-bar.css" />
</head>
<body>
  <header class="navbar">
    <div class="brand">ProTego</div>
    <nav>
      <a href="map.html">Home</a>
      <a href="report.html">Report</a>
      <a href="profile.html">Profile</a>
    </nav>
  </header>

  <main class="main">
    <div class="map-full-wrapper card">
      <div class="search-panel safe-route-panel">
        <div class="safe-route-search-row">
          <span class="search-icon">🔍</span>
          <input
            id="safeSearchInput"
            class="search-input safe-route-search-input"
            placeholder="Enter your route (start / destination)"
            readonly
            onclick="openSafeRouteModal()"
          >
          <div id="safetyScoreBadge" class="safety-score-badge" title="Live safety score at your location">
            <span class="safety-score-label">Safety</span>
            <span id="safetyScoreValue" class="safety-score-value">—</span>
          </div>
        </div>
        <div class="safe-route-buttons">
        <button class="top-icon-btn" onclick="goToEmergencyContacts()" title="Emergency Contacts">
          ☎
        </button>
        <button class="top-icon-btn" onclick="shareLiveLocation()" title="Share Live Location">
          📤
        </button>
        <button id="sosButton" class="top-icon-btn" onclick="handleSOSClick()" title="Safety SOS">
          SOS
        </button>
        <button class="top-icon-btn" onclick="openCameraOverlay()" title="Capture Evidence / Open Camera">
          📷
        </button>
        </div>
      </div>

      <div id="safeRouteMap" class="map-full"></div>
    </div>
  </main>

  <!-- Safest Route Modal -->
  <div id="safeRouteModal" class="route-modal">
    <div class="route-card">
      <h3>Plan Safest Route</h3>

      <label>Start Location</label>
      <input id="safeStartInput" placeholder="Enter start location or use My Location">
      <button id="useMyLocBtn" class="ghost" onclick="useCurrentLocationForSafeRoute()">Use My Location</button>

      <label>Destination</label>
      <input id="safeDestInput" placeholder="Enter destination">

      <div class="route-buttons">
        <button onclick="closeSafeRouteModal()">Cancel</button>
        <button onclick="submitSafeRoute()">Find Safest Route</button>
      </div>
    </div>
  </div>

  <!-- SOS Countdown Overlay -->
  <div id="sosOverlay" class="route-modal" style="display:none;">
    <div class="route-card">
      <h3>Sending SOS...</h3>
      <p id="sosCountdownText">SOS will be sent in 10 seconds.</p>
      <button onclick="cancelSOS()">Cancel SOS</button>
    </div>
  </div>

  <!-- Camera overlay (same as SafeCam - opens directly) -->
  <div id="cameraOverlay" class="route-modal" style="display:none;">
    <div class="route-card" style="width:100%;max-width:480px;">
      <h3>SafeCam</h3>
      <video id="safeCamVideo" autoplay playsinline style="width:100%;max-height:60vh;border-radius:8px;background:black;"></video>
      <div class="route-buttons" style="margin-top:12px; justify-content:space-between;">
        <button onclick="closeCameraOverlay()">Close</button>
        <button onclick="capturePhoto()">Click Picture</button>
        <button onclick="toggleTorch()">Torch</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="../js/script.js"></script>
<script src="../js/fab-bar.js"></script>
<script src="../js/camera.js"></script>
<script src="../js/safe_route.js"></script>
</body>
</html>
